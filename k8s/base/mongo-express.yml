apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  namespace: devops-practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
      - name: mongo-express
        image: mongo-express:1.0.2
        ports:
        - containerPort: 8081
        env:
        - name: ME_CONFIG_MONGODB_SERVER
          value: mongo
        - name: ME_CONFIG_MONGODB_PORT
          value: "27017"
        - name: ME_CONFIG_BASICAUTH_USERNAME
          value: admin
        - name: ME_CONFIG_BASICAUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: ME_CONFIG_BASICAUTH_PASSWORD
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "150m"
            memory: "150Mi"
            # === Probes ===
        readinessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 25
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6

        livenessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 40
          periodSeconds: 15
          timeoutSeconds: 6
          failureThreshold: 8
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
  namespace: devops-practice
spec:
  selector:
    app: mongo-express
  ports:
  - port: 8081
    targetPort: 8081
