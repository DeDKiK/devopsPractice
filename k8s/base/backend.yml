apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-practice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/dedkik/devopsPractice-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: MONGO_URL
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: PORT

        resources:
          requests:
            cpu: "100m"
            memory: "200Mi"
          limits:
            cpu: "300m"
            memory: "400Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: devops-practice
spec:
  selector:
    app: backend
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000