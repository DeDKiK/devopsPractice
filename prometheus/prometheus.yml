global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend (Node.js)
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3000']

  # node-exporter — моніторинг хоста
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']